# FlashRAG-compatible base config for local Ollama models.
# Use with main.py, for example:
# python .\main.py --base_config .\config\ollama_base_config.yaml --method_name drag_single --dataset_name strategyqa --split dev

# ------------------------------------------------Global Paths------------------------------------------------#
model2path:
  e5: ~
  llama3.1:8b: ~
  llama3.2:3b: ~
  qwen2.5:7b: ~
  mistral: ~

model2pooling:
  e5: "mean"
  bge: "cls"
  contriever: "mean"
  jina: "mean"
  dpr: "cls"

method2index:
  e5: ~
  bm25: ~
  contriever: ~

# ------------------------------------------------Environment Settings------------------------------------------------#
data_dir: "./data/flashrag_tiny/"
save_dir: "./output/"

gpu_id: "0"
dataset_name: "StrategyQA"
split: ["dev"]

test_sample_num: ~
random_sample: true
seed: 2024

save_intermediate_data: true
save_note: "ollama"

# -------------------------------------------------Retrieval Settings------------------------------------------------#
retrieval_method: "e5"
index_path: "./wiki_corpus/e5_flat_inner.index"
faiss_gpu: false
corpus_path: "./wiki_corpus/wiki18_100w.jsonl"

instruction: ~
retrieval_topk: 3
retrieval_batch_size: 256
retrieval_use_fp16: true
retrieval_query_max_length: 128
save_retrieval_cache: false
use_retrieval_cache: false
retrieval_cache_path: ~
retrieval_pooling_method: ~

use_reranker: false
rerank_model_name: ~
rerank_model_path: ~
rerank_pooling_method: ~
rerank_topk: 3
rerank_max_length: 512
rerank_batch_size: 256
rerank_use_fp16: true

# -------------------------------------------------Generator Settings------------------------------------------------#
# FlashRAG talks to Ollama through its OpenAI-compatible API.
framework: "openai"
generator_model: "llama3.1:8b"
generator_max_input_len: 4096
generator_batch_size: 1
openai_setting:
  api_key: "ollama"
  base_url: "http://localhost:11434/v1"
generation_params:
  do_sample: false
  temperature: 0.0
  max_tokens: 256
use_fid: false

# -------------------------------------------------Refiner Settings------------------------------------------------#
refiner_name: ~
refiner_model_path: ~

refiner_topk: 3
refiner_pooling_method: "mean"
refiner_encode_max_length: 256
refiner_max_input_length: 1024
refiner_max_output_length: 512

llmlingua_config:
  rate: 0.55
  condition_in_question: "after_condition"
  reorder_context: "sort"
  dynamic_context_compression_ratio: 0.3
  condition_compare: true
  context_budget: "+100"
  rank_method: "longllmlingua"
sc_config:
  reduce_ratio: 0.5

# -------------------------------------------------Evaluation Settings------------------------------------------------#
metrics: ["em", "f1", "acc", "precision", "recall"]
metric_setting:
  retrieval_recall_topk: 3
save_metric_score: true
